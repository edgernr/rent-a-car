# Render blueprint — deploys the NestJS API + PostgreSQL.
# In the Render dashboard: New → Blueprint → pick this repo. Render reads this file.
# (Web storefront + admin console deploy separately on Vercel — see DEPLOY.md.)

databases:
  - name: srd-db
    plan: free
    region: frankfurt
    databaseName: srd
    user: srd

services:
  - type: web
    name: srd-api
    runtime: node
    plan: free
    region: frankfurt
    healthCheckPath: /api/v1/health
    # pnpm is already provided by Render (do NOT run `corepack enable` — it tries to
    # rewrite /usr/bin/pnpm on a read-only FS and fails with EROFS).
    # --prod=false forces devDependencies (tsc, nest, prisma, tsx) even though
    # NODE_ENV=production is set on the service (Render applies env at build).
    buildCommand: >-
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm --filter @srd/config build &&
      pnpm --filter @srd/types build &&
      pnpm --filter @srd/api exec prisma generate &&
      pnpm --filter @srd/api build
    # Seed runs on every boot — safe because the seed is fully idempotent (upserts)
    # and only touches the demo rows, never user-created data. Remove `db seed`
    # here once you no longer want the demo vendor/logins reasserted.
    startCommand: >-
      pnpm --filter @srd/api exec prisma migrate deploy &&
      pnpm --filter @srd/api exec prisma db seed &&
      node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: srd-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: USD_INDICATIVE_RATE_UZS
        value: "12600"
      # Set to your Vercel URLs once they exist (comma-separated). Safety only —
      # the frontends call the API through same-origin proxies, not directly.
      - key: CORS_ORIGINS
        sync: false
